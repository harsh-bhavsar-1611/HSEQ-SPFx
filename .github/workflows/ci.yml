name: SPFx CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
    # Only run if actual code changes, not documentation or the workflow itself
    paths-ignore:
      - '.github/workflows/**'
      - '**.md'
      - '.gitignore'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22' # Stable version for SPFx
          cache: 'npm'

      - name: Install dependencies
        # Uses 'npm install' if package-lock.json is missing, else 'npm ci'
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Validate clean build
        run: npx heft build --clean