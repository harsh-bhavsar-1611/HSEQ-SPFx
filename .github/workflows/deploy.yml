name: SPFx Multi-Stage Deployment

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'sharepoint/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build and package SPFx solution
        run: |
          npx heft build --production
          npx heft package-solution --production

      - name: Upload SPPKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-package
          path: sharepoint/solution/*.sppkg
          if-no-files-found: error

  deploy-dev:
    needs: build
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Microsoft 365 CLI
        run: npm install @pnp/cli-microsoft365

      - name: Deploy to Development
        shell: bash
        run: |
          set -e
          echo "--- Checking Artifacts ---"
          ls -R artifacts
          
          # 1. Locate the package
          PACKAGE_PATH=$(find artifacts -name "*.sppkg" | head -n 1)
          
          if [ -z "$PACKAGE_PATH" ]; then
            echo "Error: No .sppkg file found in artifacts directory."
            exit 1
          fi
          
          FILENAME=$(basename "$PACKAGE_PATH")
          echo "Found package: $FILENAME at $PACKAGE_PATH"
          
          # 2. Login using certificate (Strip PEM headers if they exist)
          echo "Logging into Microsoft 365..."
          CLEANED_CERT=$(echo "$CERT_PRIVATE_KEY" | sed 's/-----[^-]*-----//g' | tr -d '\n\r ')
          
          npx m365 login --authType certificate \
            --appId "$CLIENT_ID" \
            --tenant "$TENANT_ID" \
            --certificateBase64Encoded "$CLEANED_CERT" \
            --thumbprint "$CERT_THUMBPRINT" \
            --debug
          
          # 3. Deploy to SharePoint
          echo "Adding app to SharePoint app catalog..."
          npx m365 spo app add --filePath "$PACKAGE_PATH" --overwrite
          
          echo "Deploying app..."
          npx m365 spo app deploy --name "$FILENAME"
          
          echo "Deployment successful!"
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CERT_PRIVATE_KEY: ${{ secrets.CERT_PRIVATE_KEY }}
          CERT_THUMBPRINT: ${{ secrets.CERT_THUMBPRINT }}

