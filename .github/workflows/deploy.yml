name: SPFx Multi-Stage Deployment

on:
  push:
    branches: [main]
    # Only trigger when project-related files change
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'sharepoint/**'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build and package SPFx solution
        run: |
          npx heft build --production
          npx heft package-solution --production

      - name: Upload SPPKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-package
          # Corrected path to include 'sharepoint/' folder
          path: sharepoint/solution/*.sppkg
          if-no-files-found: error

  deploy-dev:
    needs: build
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Microsoft 365 CLI (pinned, local)
        run: npm i --no-audit --no-fund --save-dev @pnp/cli-microsoft365@6.0.0

      - name: Deploy to Development (with diagnostics)
        shell: bash
        env:
          CLIMICROSOFT365_DEBUG: "1"
        run: |
          set -Eeuo pipefail
          set -x
          trap 'echo "::error::Failed on line $LINENO: $BASH_COMMAND"' ERR

          M365="./node_modules/.bin/m365"

          node -v
          npm -v
          "$M365" --version

          PACKAGE_PATH=$(find artifacts -name "*.sppkg" | head -n 1)
          [ -n "${PACKAGE_PATH:-}" ] || (echo "::error::No .sppkg found"; exit 1)
          FILENAME=$(basename "$PACKAGE_PATH")

          "$M365" login \
            --authType certificate \
            --appId "${{ secrets.CLIENT_ID }}" \
            --tenant "${{ secrets.TENANT_ID }}" \
            --certificateBase64Encoded "${{ secrets.CERT_PFX_BASE64 }}" \
            --thumbprint "${{ secrets.CERT_THUMBPRINT }}" \
            --debug

          "$M365" spo app add --filePath "$PACKAGE_PATH" --overwrite --debug
          "$M365" spo app deploy --name "$FILENAME" --debug