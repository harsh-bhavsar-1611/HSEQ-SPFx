name: SPFx CD

on:
  workflow_run:
    workflows: ["SPFx CI"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  deploy-dev:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    name: Deploy to Development
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Download artifact from the preceding CI workflow
      - name: Download SPPKG artifact
        uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id || github.run_id }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Microsoft 365 CLI
        run: npm install @pnp/cli-microsoft365

      - name: Deploy to SharePoint
        shell: bash
        run: |
          set -e
          echo "--- Checking Artifacts ---"
          ls -R artifacts
          
          # Locate the package
          PACKAGE_PATH=$(find artifacts -name "*.sppkg" | head -n 1)
          if [ -z "$PACKAGE_PATH" ]; then
            echo "Error: No .sppkg file found."
            exit 1
          fi
          FILENAME=$(basename "$PACKAGE_PATH")
          
          # Login
          printf "%s" "$CERT_PRIVATE_KEY" > private.key
          npx m365 login --authType certificate --appId "$CLIENT_ID" --tenant "$TENANT_ID" --certificateFile private.key --thumbprint "$CERT_THUMBPRINT"
          
          # Skip Graph
          npx m365 spo set --url "$SPO_SITE_URL"
          
          # Deploy
          npx m365 spo app add --filePath "$PACKAGE_PATH" --overwrite
          npx m365 spo app deploy --name "$FILENAME"
          
          rm private.key
          echo "Deployment to Dev successful!"
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CERT_PRIVATE_KEY: ${{ secrets.CERT_PRIVATE_KEY }}
          CERT_THUMBPRINT: ${{ secrets.CERT_THUMBPRINT }}
          SPO_SITE_URL: ${{ secrets.SPO_SITE_URL }}

