name: SPFx Multi-Stage Deployment

on:
  push:
    branches: [main]
    # Only trigger when project-related files change
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'sharepoint/**'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build and package SPFx solution
        run: |
          npx heft build --production
          npx heft package-solution --production

      - name: Upload SPPKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-package
          # Corrected path to include 'sharepoint/' folder
          path: sharepoint/solution/*.sppkg
          if-no-files-found: error

  deploy-dev:
    needs: build
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Microsoft 365 CLI
        run: npm install @pnp/cli-microsoft365

      - name: Deploy to Development
        shell: bash
        run: |
          PACKAGE_PATH=$(find artifacts -name "*.sppkg" | head -n 1)
          FILENAME=$(basename "$PACKAGE_PATH")
          
          # Use a heredoc to write the key safely
          cat <<EOF > private.key
          ${{ secrets.CERT_PRIVATE_KEY }}
          EOF
          
          npx m365 login --authType certificate --appId "${{ secrets.CLIENT_ID }}" --tenant "${{ secrets.TENANT_ID }}" --certificateFile private.key --thumbprint "${{ secrets.CERT_THUMBPRINT }}"
          
          npx m365 spo app add --filePath "$PACKAGE_PATH" --overwrite
          npx m365 spo app deploy --name "$FILENAME"
          rm private.key