name: SPFx Multi-Stage Deployment

on:
  push:
    branches: [main]
    # Only trigger when project-related files change
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'sharepoint/**'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build and package SPFx solution
        run: |
          npx heft build --production
          npx heft package-solution --production

      - name: Upload SPPKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-package
          # Corrected path to include 'sharepoint/' folder
          path: sharepoint/solution/*.sppkg
          if-no-files-found: error

  deploy-dev:
    needs: build
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Microsoft 365 CLI
        run: npm install @pnp/cli-microsoft365

      - name: Deploy package to Development app catalog
        shell: bash
        run: |
          # Dynamically find the package name
          PACKAGE_PATH=$(find artifacts -name "*.sppkg" | head -n 1)
          FILENAME=$(basename "$PACKAGE_PATH")
          
          # Using 'npx m365' to avoid "command not found" errors
          npx m365 login --authType secret --appId "$CLIENT_ID" --tenant "$TENANT_ID" --secret "$CLIENT_SECRET"
          npx m365 spo app add --filePath "$PACKAGE_PATH" --overwrite
          npx m365 spo app deploy --name "$FILENAME"
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

  # Note: Repeat the 'deploy-dev' structure for 'deploy-staging' and 'deploy-prod'
  # changing only the 'environment' name and potentially the secrets if they differ.