name: SPFx Multi-Stage Deployment

on:
  push:
    branches: [main]
    # Only trigger when project-related files change
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'sharepoint/**'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build and package SPFx solution
        run: |
          npx heft build --production
          npx heft package-solution --production

      - name: Upload SPPKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-package
          # Corrected path to include 'sharepoint/' folder
          path: sharepoint/solution/*.sppkg
          if-no-files-found: error

  deploy-dev:
    needs: build
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to Development (with diagnostics)
        shell: bash
        env:
          # Enable verbose output from m365 CLI
          CLIMICROSOFT365_DEBUG: "1"
        run: |
          # Print each command (good for pinpointing failures)
          set -Eeuo pipefail
          set -x

          echo "Node: $(node -v)"
          echo "NPM:  $(npm -v)"

          echo "=== Listing artifacts ==="
          ls -la artifacts || true
          find artifacts -maxdepth 3 -type f -print || true

          PACKAGE_PATH=$(find artifacts -name "*.sppkg" | head -n 1)
          if [ -z "${PACKAGE_PATH:-}" ]; then
            echo "::error::No .sppkg found in artifacts"
            exit 1
          fi
          echo "PACKAGE_PATH=$PACKAGE_PATH"

          FILENAME=$(basename "$PACKAGE_PATH")
          echo "FILENAME=$FILENAME"

          echo "=== m365 CLI version ==="
          npx --yes @pnp/cli-microsoft365 --version

          # On any failure, print a clear message with line number + last command
          trap 'echo "::error::Failed on line $LINENO: $BASH_COMMAND"' ERR

          echo "=== Logging in to Microsoft 365 (debug enabled) ==="
          npx --yes @pnp/cli-microsoft365 login \
            --authType certificate \
            --appId "${{ secrets.CLIENT_ID }}" \
            --tenant "${{ secrets.TENANT_ID }}" \
            --certificateBase64Encoded "${{ secrets.CERT_PFX_BASE64 }}" \
            --thumbprint "${{ secrets.CERT_THUMBPRINT }}" \
            --debug

          echo "=== Adding app to app catalog (debug enabled) ==="
          npx --yes @pnp/cli-microsoft365 spo app add \
            --filePath "$PACKAGE_PATH" \
            --overwrite \
            --debug

          echo "=== Deploying app (debug enabled) ==="
          npx --yes @pnp/cli-microsoft365 spo app deploy \
            --name "$FILENAME" \
            --debug

          echo "=== Deployment finished successfully ==="