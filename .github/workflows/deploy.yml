name: SPFx Multi-Stage Deployment

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - 'sharepoint/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build and package SPFx solution
        run: |
          npx heft build --production
          npx heft package-solution --production

      - name: Upload SPPKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-package
          path: sharepoint/solution/*.sppkg
          if-no-files-found: error

  deploy-dev:
    needs: build
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Microsoft 365 CLI
        run: npm install @pnp/cli-microsoft365

      - name: Deploy to Development
        shell: bash
        run: |
          set -e
          # 1. Locate the package
          PACKAGE_PATH=$(find artifacts -name "*.sppkg" | head -n 1)
          FILENAME=$(basename "$PACKAGE_PATH")
          
          # 2. Write the private key to a file safely
          cat <<EOF > private.key
          ${{ secrets.CERT_PRIVATE_KEY }}
          EOF
          
          # 3. Login using npx m365 (This fixes the 'executable not found' error)
          npx m365 login --authType certificate --appId "${{ secrets.CLIENT_ID }}" --tenant "${{ secrets.TENANT_ID }}" --certificateFile private.key --thumbprint "${{ secrets.CERT_THUMBPRINT }}"
          
          # 4. Deploy to SharePoint
          npx m365 spo app add --filePath "$PACKAGE_PATH" --overwrite
          npx m365 spo app deploy --name "$FILENAME"
          
          # 5. Cleanup
          rm private.key
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          TENANT_ID: ${{ secrets.TENANT_ID }}

  # Note: Repeat the 'deploy-dev' logic for 'deploy-staging' and 'deploy-prod' 
  # by copying the steps and changing the environment name.