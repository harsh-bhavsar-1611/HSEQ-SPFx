name: SPFx Multi-Stage Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package SPFx solution
        run: |
          npx heft build --production
          npx heft package-solution --production

      - name: Upload SPPKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-package
          path: sharepoint/solution/*.sppkg
          if-no-files-found: error

  deploy-dev:
    needs: build
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Microsoft 365 CLI
        run: npm install -g @pnp/cli-microsoft365

      - name: Deploy package to Development app catalog
        shell: bash
        run: |
          PACKAGE_PATH=$(find artifacts -name "*.sppkg" | head -n 1)
          m365 login --authType secret --appId "$CLIENT_ID" --tenant "$TENANT_ID" --secret "$CLIENT_SECRET"
          m365 spo app add --filePath "$PACKAGE_PATH" --overwrite
          m365 spo app deploy --name "$(basename "$PACKAGE_PATH")"
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

  deploy-staging:
    needs: deploy-dev
    environment: Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Microsoft 365 CLI
        run: npm install -g @pnp/cli-microsoft365

      - name: Deploy package to Staging app catalog
        shell: bash
        run: |
          PACKAGE_PATH=$(find artifacts -name "*.sppkg" | head -n 1)
          m365 login --authType secret --appId "$CLIENT_ID" --tenant "$TENANT_ID" --secret "$CLIENT_SECRET"
          m365 spo app add --filePath "$PACKAGE_PATH" --overwrite
          m365 spo app deploy --name "$(basename "$PACKAGE_PATH")"
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

  deploy-prod:
    needs: deploy-staging
    environment: Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spfx-package
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Microsoft 365 CLI
        run: npm install -g @pnp/cli-microsoft365

      - name: Deploy package to Production app catalog
        shell: bash
        run: |
          PACKAGE_PATH=$(find artifacts -name "*.sppkg" | head -n 1)
          m365 login --authType secret --appId "$CLIENT_ID" --tenant "$TENANT_ID" --secret "$CLIENT_SECRET"
          m365 spo app add --filePath "$PACKAGE_PATH" --overwrite
          m365 spo app deploy --name "$(basename "$PACKAGE_PATH")"
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
